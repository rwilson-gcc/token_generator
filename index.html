<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Token Generator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f4f4f4;
    }
    .container {
        background: white;
        padding: 20px;
        max-width: 600px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        margin: auto;
    }
    input, select, button {
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        font-size: 16px;
    }
    button {
        cursor: pointer;
        background: #0078D7;
        color: white;
        border: none;
        border-radius: 6px;
    }
    pre {
        background: #222;
        color: #0f0;
        padding: 15px;
        border-radius: 6px;
        margin-top: 20px;
        white-space: pre-wrap;
    }
</style>
</head>
<body>

<div class="container">
    <h2>WS Token Generator</h2>

    <label>How many tokens?</label>
    <input type="number" id="count" min="1" placeholder="Enter a positive number">

    <label>Competition Part (APP or INF)</label>
    <select id="part">
        <option value="">-- Select --</option>
        <option value="APP">APP</option>
        <option value="INF">INF</option>
    </select>

    <button onclick="generateTokens()">Generate Tokens</button>

    <pre id="output"></pre>

    <button onclick="downloadTokens()">Download tokens.txt</button>
</div>

<script>
function generateRandomString(length) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let result = "";
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

let generatedTokens = [];

function generateTokens() {
    const count = parseInt(document.getElementById("count").value);
    const part = document.getElementById("part").value.toUpperCase();

    generatedTokens = [];
    document.getElementById("output").textContent = "";

    // Validation
    if (isNaN(count) || count <= 0) {
        alert("Please enter a valid positive number for token count.");
        return;
    }

    if (part !== "APP" && part !== "INF") {
        alert("Competition part must be APP or INF.");
        return;
    }

    // Generate tokens
    for (let i = 1; i <= count; i++) {
        const num = String(i).padStart(2, "0");
        const randomStr = generateRandomString(32);
        const token = `ws-${part}-${num}{${randomStr}}`;
        generatedTokens.push(token);
    }

    document.getElementById("output").textContent = generatedTokens.join("\n");
}

function downloadTokens() {
    if (generatedTokens.length === 0) {
        alert("No tokens generated yet.");
        return;
    }

    const blob = new Blob([generatedTokens.join("\n")], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tokens.txt";
    a.click();
}
</script>

</body>
</html>
